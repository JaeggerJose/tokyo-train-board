name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token stored.
# Trigger: create a GitHub Release (tag like v0.1.1). Bump the version in
# pyproject.toml first; PyPI version numbers cannot be reused.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The PyPI-side trusted publisher must reference this environment name.
    environment:
      name: pypi
      url: https://pypi.org/project/tokyo-train-board/
    permissions:
      id-token: write  # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
